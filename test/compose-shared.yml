services:
  s3-server:
    image: chrislusf/seaweedfs:4.29@sha256:d47c7ee99fcb951351d7194915f4e3a5ea604a8e8871183d713907dec4fb9bf5
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: "test1234"
      S3_BUCKET: backup
    command:
      - mini
      - -dir /data
    volumes:
      - s3-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8333/healthz"]
      interval: 2s
      timeout: 1s
      retries: 10

  s3-client:
    image: amazon/aws-cli:2.34.54
    environment:
      AWS_ENDPOINT_URL: "http://s3-server:8333"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: "test1234"
      AWS_DEFAULT_REGION: us-east-1
      AWS_S3_USE_PATH_STYLE: true
    entrypoint: tail -f /dev/null

volumes:
  s3-data:
