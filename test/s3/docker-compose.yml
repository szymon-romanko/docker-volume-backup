services:
  s3-server:
    image: chrislusf/seaweedfs:4.29@sha256:d47c7ee99fcb951351d7194915f4e3a5ea604a8e8871183d713907dec4fb9bf5
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: "test1234"
      S3_BUCKET: backup
    command:
      - mini
      - -dir /data
    volumes:
      - s3-data:/data
    healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:8333/healthz"]
        interval: 2s
        timeout: 1s
        retries: 10

  backup:
    image: offen/docker-volume-backup:${TEST_VERSION:-canary}
    hostname: hostnametoken
    depends_on:
      s3-server:
        condition: service_healthy
    restart: always
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: "test1234"
      AWS_ENDPOINT: s3-server:8333
      AWS_ENDPOINT_PROTO: http
      AWS_S3_BUCKET_NAME: backup
      BACKUP_FILENAME_EXPAND: 'true'
      BACKUP_FILENAME: test-$$HOSTNAME.tar.gz
      BACKUP_CRON_EXPRESSION: 0 0 5 31 2 ?
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_PRUNING_LEEWAY: 5s
      BACKUP_PRUNING_PREFIX: test
    volumes:
      - app_data:/backup/app_data:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  offen:
    image: offen/offen:latest
    labels:
      - docker-volume-backup.stop-during-backup=true
    volumes:
      - app_data:/var/opt/offen
    healthcheck:
      # healthcheck adapted from dockerfile of this image
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/healthz || exit 1"]
      interval: 1s
      timeout: 1s
      retries: 15

  s3-client:
    image: amazon/aws-cli:2.34.54
    environment:
      AWS_ENDPOINT_URL: "http://s3-server:8333"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: "test1234"
      AWS_DEFAULT_REGION: us-east-1
      AWS_S3_USE_PATH_STYLE: true
    entrypoint: tail -f /dev/null

volumes:
  s3-data:
    name: s3-data
  app_data:
